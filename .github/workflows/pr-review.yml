name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with AI
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ""

          ANTHROPIC_DEFAULT_OPUS_MODEL: openrouter/free
          ANTHROPIC_DEFAULT_SONNET_MODEL: openrouter/free
          ANTHROPIC_DEFAULT_HAIKU_MODEL: openrouter/free
          CLAUDE_CODE_SUBAGENT_MODEL: openrouter/free

        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}

          show_full_output: true

          claude_args: |
            --model openrouter/free
            --max-turns 20
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*)"

          prompt: |
            Review the current pull request.

            First inspect:
            - the complete PR diff
            - the PR metadata
            - only code changed by this pull request

            Focus only on real problems:
            - bugs and incorrect logic
            - security vulnerabilities
            - race conditions
            - missing error handling that can cause failures
            - breaking changes
            - database and migration risks
            - Docker, Kubernetes, and GitHub Actions mistakes

            Do not comment on:
            - formatting
            - minor style preferences
            - harmless naming choices
            - praise
            - unchanged code

            For every real issue:
            - identify the exact changed file
            - identify the exact changed line
            - explain the problem
            - explain the impact
            - suggest a practical fix

            IMPORTANT:
            You MUST post a real GitHub Pull Request Review with inline comments.

            Repository:
            ${{ github.repository }}

            Pull request:
            ${{ github.event.pull_request.number }}

            Commit SHA:
            ${{ github.event.pull_request.head.sha }}

            Use the GitHub API through `gh api`.

            Create exactly ONE review containing:
            - one inline comment for each significant issue
            - a short summary in the review body

            Submit the review to:

            POST /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews

            The JSON request body must use this structure:

            {
              "commit_id": "${{ github.event.pull_request.head.sha }}",
              "body": "AI PR Review summary",
              "event": "COMMENT",
              "comments": [
                {
                  "path": "path/to/file",
                  "line": 10,
                  "side": "RIGHT",
                  "body": "Explain the problem, impact, and suggested fix."
                }
              ]
            }

            Rules:
            - Only comment on lines that are part of the PR diff.
            - Use side RIGHT for added or modified lines.
            - Do not comment on unchanged lines.
            - Do not create duplicate comments.
            - Do not submit APPROVE.
            - Do not submit REQUEST_CHANGES.
            - Use event COMMENT.

            If no significant issues are found, create one review with
            no inline comments and this body:

            AI PR Review: No significant problems found.

            You MUST submit the GitHub PR review before finishing.
