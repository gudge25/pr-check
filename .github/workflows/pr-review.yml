name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review PR with AI
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ""

          ANTHROPIC_DEFAULT_OPUS_MODEL: openrouter/free
          ANTHROPIC_DEFAULT_SONNET_MODEL: openrouter/free
          ANTHROPIC_DEFAULT_HAIKU_MODEL: openrouter/free
          CLAUDE_CODE_SUBAGENT_MODEL: openrouter/free

        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          show_full_output: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request.

            The PR branch is already checked out in the current working directory.

            Focus only on real problems:
            - bugs and incorrect logic
            - security vulnerabilities
            - race conditions
            - missing error handling that can cause failures
            - breaking changes
            - database and migration risks
            - Docker, Kubernetes, and GitHub Actions mistakes

            Do not comment on:
            - formatting
            - minor style preferences
            - harmless naming choices
            - praise
            - unchanged code

            For each significant issue:
            - explain the exact problem
            - explain the impact
            - suggest a practical fix
            - post an inline comment on the relevant changed line using
              `mcp__github_inline_comment__create_inline_comment`
              with `confirmed: true`

            Use `gh pr comment` only for a short top-level summary.

            If no significant issues are found, post exactly one top-level comment:
            "AI PR Review: No significant problems found."

            Only post GitHub comments.
            Do not return the review as normal assistant text.

          claude_args: |
            --model openrouter/free
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
